research_brief: |
  Squad de desenvolvimento de software para o Célula Mais (Next.js + TypeScript + Drizzle/Postgres).
  Qualidade: minimum-viable (manual test, sem testes automatizados obrigatórios).
  Frameworks aplicados:
  - PM: User stories INVEST + critérios de aceite em Gherkin + priorização MoSCoW.
  - UX: Fluxo happy path + estados alternativos (vazio/loading/erro/sucesso), reuso de design system.
  - Tech Lead: Leitura prévia de código, plano com arquivos exatos, passo a passo numerado, riscos e trade-offs explícitos.
  - Dev: TypeScript estrito, validação Zod server-side, server actions Next.js, error handling com toasts, commits pequenos.
  - QA: Checklist baseado em critérios de aceite, teste manual de happy path + estados + edge cases, bug report acionável com severidade.
  Vocabulário comum: user story, critério de aceite, MVP, happy path, edge case, server action, migration, trade-off, breaking change, severidade, regressão.
  Anti-patterns comuns em dev: any no TS, pular validação server-side, aprovar sem testar edge cases, plano técnico vago, stories sem critérios de aceite, microcopy genérica, ignorar estados de erro.

